    <main class="conteudo">
        <section class="atividades">
            <div class="titulo">
                <p id="text"></p>
            </div>
            <div class="container">
                <div class="atividade" id="atividade0">
                    <label for="idade">Digite sua idade</label>
                    <p id="msg-idade"></p>
                    <input type="number" name="idade" id="idade">
                    <button onclick="calcularIdade()" class="btn">Enviar</button>
                </div>
            </div>
            <div class="container">
                <div class="atividade" id="atividade2">
                    <p id="ms-Mm"></p>
                    <input type="text" id="maiorMenor" placeholder="Dígite o número" />
                    <button class="btn-executar" onclick="negativoPositivo()">Enviar</button>
                </div>
            </div>
            <div class="container">
                <div class="atividade" id="atividade2">
                    <p id="valor"></p>
                    <p id="msg-valor"></p>
                    <input type="text" id="saldo" placeholder="Dígite seu saldo" />
                    <input type="text" id="debito" placeholder="Dígite quanto foi debitado" />
                    <input type="text" id="credito" placeholder="Dígite quanto de crédito possuí" />
                    <button class="btn-executar" onclick="saldo()">Enviar</button>
                </div>
            </div>
            <div class="container">
                <div class="atividade" id="atividade2">
                    <p id="msg-genero"></p>
                    <span>Digite seu genero</span>
                    <input type="text" id="genero" placeholder="seu genero" />
                    <button class="btn-executar" onclick="genero()">Enviar</button>
                </div>
            </div>

                    <input type="number" id="valor2" placeholder="seu valor" required/>
                    <input type="number" id="valor3" placeholder="seu valor" required/>
                    <button class="btn-executar" onclick="sorteio()">Enviar</button>
                </div>
            </div>
            <div class="container">
